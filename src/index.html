<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/src/assets/favicon/Seikon-no-Qwaser-favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="/src/styles/style.css">
    <title>Seikon no Qwaser Card</title>
</head>
<body>
    <!-- HEADER con all'interno il logo dell'anime -->
    <header id="header">
        <img src="/src/assets/logo/Seikon_no_Qwaser_logo.png" alt="logo dell'anime Seikon no Qwaser in giapponese">
    </header>

    <!-- div contenitore che contiene tutte le card -->
    <div id="cardContainer">
        <!-- card del personaggio di Sasha -->
        <div class="card-sasha">
            <!-- button che fa aprire e chiudere la card -->
            <button id="btnSasha" class="btn">Open card of Alexander Nikolaevich Hell (Sasha)</button>
            <div id="infoSasha">
                <img src="/src/assets/img/Sasha.png" alt="immagine che rappresenta Sasha">
            </div>
        </div>

        <!-- card del personaggio di Teresa -->
        <div class="card-teresa">
            <!-- button che fa aprire e chiudere la card -->
            <button id="btnTeresa" class="btn">Open card of Teresa Beria</button>
            <div id="infoTeresa">
                <img src="/src/assets/img/Teresa-Beria.png" alt="immagine che rappresenta Teresa">
            </div>
        </div>

    <!-- Collegamento a JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
