<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/src/assets/favicon/Seikon-no-Qwaser-favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="/src/styles/style.css">
    <title>Seikon no Qwaser Card</title>
</head>
<body>
    <!-- HEADER con all'interno il logo dell'anime -->
    <header id="header">
        <img src="/src/assets/logo/Seikon_no_Qwaser_logo.png" alt="logo dell'anime Seikon no Qwaser in giapponese">
    </header>

    <!-- div contenitore che contiene tutte le card -->
    <div id="cardContainer">
        <!-- card del personaggio di Sasha -->
        <div class="card-sasha">
            <!-- button che fa aprire e chiudere la card -->
            <button id="btnSasha" class="btn">Open card of Sasha</button>

            <!-- card del personaggio -->
            <div id="infoSasha" class="card-info">
                <!-- header della card -->
                <div class="card-header">
                    <img src="/src/assets/img/sasha.png" class="sasha-img" alt="immagine che rappresenta Sasha">
                    <h3>Alexander Nikolaevich Hell</h3>
                </div>

                <!-- body della card -->
                <div class="card-body">
                    Name: <br>
                    Age: <br>
                    Height: <br>
                    
                </div>
            </div>
        </div>

        <!-- card del personaggio di Teresa -->
        <div class="card-teresa">
            <!-- button che fa aprire e chiudere la card -->
            <button id="btnTeresa" class="btn">Open card of Teresa</button>

            <!-- card del personaggio -->
            <div id="infoTeresa" class="card-info">
                <!-- header della card -->
                <div class="card-header">
                    <img src="/src/assets/img/teresa.png" class="teresa-img" alt="immagine che rappresenta Teresa">
                    <h3>Teresa Beria</h3>
                </div>

                <!-- body della card -->
                <div class="card-body">
                    <p>
                        Name: <br>
                        Age: <br>
                        Height: <br>

                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Collegamento a JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
